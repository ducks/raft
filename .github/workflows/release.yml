name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          test "${GITHUB_REF_NAME}" = "v${version}"
      - run: cargo fmt --all -- --check
      - run: cargo test --all-targets --locked
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - run: cargo publish --dry-run --locked

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Archive Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: tar -C target/${{ matrix.target }}/release -czf raft-${{ github.ref_name }}-${{ matrix.target }}.tar.gz raft
      - name: Archive Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/raft.exe -DestinationPath raft-${{ github.ref_name }}-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: raft-${{ matrix.target }}
          path: raft-${{ github.ref_name }}-${{ matrix.target }}.*
          if-no-files-found: error

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        shell: bash
        run: cd artifacts && sha256sum * > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes
          gh release upload "${GITHUB_REF_NAME}" artifacts/* --clobber

  crates-io:
    needs: build
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crate
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
